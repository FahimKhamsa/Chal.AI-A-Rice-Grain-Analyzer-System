name: chal_ai
description: "Chal.AI - AI-Powered Rice Grain Classification App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Camera & Image
  camera: ^0.11.1
  image_picker: ^1.2.2

  # Charts
  fl_chart: ^0.70.2

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  path_provider: ^2.1.5
  http: ^1.2.0
  share_plus: ^10.1.4
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
